name: Kampanyaları Güncelle

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resmî kaynakları tara
        run: python scripts/update_campaigns.py
      - name: Değişiklikleri yayınla
        run: |
          git config user.name "abonelik-takibi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add campaigns.json
          git diff --cached --quiet || git commit -m "Kampanyaları otomatik güncelle"
          git push
